server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/seat_reservation?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: seat-reservation-system-2026-secret-key-must-be-long-enough
  expiration: 7200000  # 2小时（毫秒）

# 预约业务规则
reservation:
  rules:
    max-per-day: 3          # 每天最多预约次数
    max-duration: 4          # 单次预约最长时间（小时）
    cancel-deadline: 30      # 开始前多少分钟内不可取消
    checkin-window: 15       # 签到时间窗口（前后分钟）
    open-time: "07:00"       # 自习室开放时间
    close-time: "22:00"      # 自习室关闭时间
    violation-limit: 3       # 连续违约次数触发处罚
    ban-days: 7              # 处罚暂停天数
